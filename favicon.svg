<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#facc15" />
            <stop offset="100%" stop-color="#f97316" />
        </linearGradient>
    </defs>
    <!-- Dark Background -->
    <rect width="512" height="512" rx="120" fill="#09090b" />
    
    <!-- Gradient Cube Base -->
    <rect x="64" y="64" width="384" height="384" rx="40" fill="url(#grad)" />
    
    <!-- Cube Grid Lines -->
    <path d="M192,64 v384 M320,64 v384 M64,192 h384 M64,320 h384" stroke="#09090b" stroke-width="24" stroke-linecap="round" />
    
    <!-- AI Text Overlay -->
    <rect x="140" y="180" width="232" height="152" rx="20" fill="#09090b" opacity="0.9" />
    <text x="256" y="286" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="110" fill="url(#grad)" text-anchor="middle" letter-spacing="-2">AI</text>
</svg>