<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Futuristic Neon Gradients -->
        <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#facc15" />
            <stop offset="100%" stop-color="#f97316" />
        </linearGradient>
        <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2dd4bf" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
        <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>
        <!-- Glowing Filter for the AI Text -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="10" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Dark Background -->
    <rect width="512" height="512" rx="110" fill="#09090b" />
    
    <!-- 3D Isometric Cube Faces -->
    <polygon points="256,56 376,128 256,200 136,128" fill="url(#topGrad)" />
    <polygon points="136,128 256,200 256,344 136,272" fill="url(#leftGrad)" />
    <polygon points="376,128 256,200 256,344 376,272" fill="url(#rightGrad)" />
    
    <!-- Cube Grid Lines -->
    <g stroke="#09090b" stroke-linecap="round" stroke-linejoin="round">
        <!-- Outer border -->
        <polygon points="256,56 376,128 376,272 256,344 136,272 136,128" fill="none" stroke-width="16" />
        
        <!-- Main inner edges -->
        <path d="M256,200 L256,344 M256,200 L136,128 M256,200 L376,128" stroke-width="12" />
        
        <!-- 3x3 Grid Lines on Top Face -->
        <path d="M176,104 L296,176 M216,80 L336,152" stroke-width="8" />
        <path d="M336,104 L216,176 M296,80 L176,152" stroke-width="8" />
        
        <!-- 3x3 Grid Lines on Left Face -->
        <path d="M176,152 L176,296 M216,176 L216,320" stroke-width="8" />
        <path d="M136,176 L256,248 M136,224 L256,296" stroke-width="8" />
        
        <!-- 3x3 Grid Lines on Right Face -->
        <path d="M336,152 L336,296 M296,176 L296,320" stroke-width="8" />
        <path d="M376,176 L256,248 M376,224 L256,296" stroke-width="8" />
    </g>

    <!-- Glowing Center AI Text -->
    <text x="256" y="240" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="110" fill="#ffffff" text-anchor="middle" filter="url(#glow)">AI</text>
    
    <!-- Title Text -->
    <text x="256" y="425" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="3">AI SPEED</text>
    <text x="256" y="475" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="44" fill="url(#topGrad)" text-anchor="middle" letter-spacing="8">CUBE</text>
</svg>
